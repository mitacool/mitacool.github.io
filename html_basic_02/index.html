<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SRMA 24 Kediri</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #59aad3, #52b5df);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            background:white;
            max-width:800px;
            width:100%;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            text-align:center;
        }

        h1{
            color:#49a8f1;
            margin-bottom:15px;
        }

        .intro{
            font-size:18px;
            margin-bottom:20px;
            color:#444;
        }

        img{
            width:180px;
            height:180px;
            object-fit:cover;
            border-radius:50%;
            border:5px solid #49a8f1;
            margin:20px 0;
        }

        .btn{
            display:inline-block;
            background:#49a8f1;
            color:white;
            text-decoration:none;
            padding:12px 25px;
            border-radius:30px;
            margin:15px 0;
            transition:0.3s;
        }

        .btn:hover{
            background:#287cc0;
            transform:scale(1.05);
        }

        h2{
            margin-top:25px;
            color:#722253;
        }

        ol{
            text-align:left;
            max-width:250px;
            margin:15px auto;
        }

        li{
            color:#722253;
            margin:8px 0;
            font-size:18px;
        }
        .bubbles{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    pointer-events:none;
}

.bubbles span{
    position:absolute;
    bottom:-100px;
    width:40px;
    height:40px;
    border-radius:50%;

    background:rgba(6, 22, 238, 0.35);
    backdrop-filter:blur(5px);

    animation:floatBubble linear infinite;
}

.bubbles span:nth-child(1){
    left:10%;
    animation-duration:12s;
}

.bubbles span:nth-child(2){
    left:25%;
    width:60px;
    height:60px;
    animation-duration:18s;
}

.bubbles span:nth-child(3){
    left:40%;
    animation-duration:10s;
}

.bubbles span:nth-child(4){
    left:55%;
    width:70px;
    height:70px;
    animation-duration:20s;
}

.bubbles span:nth-child(5){
    left:70%;
    animation-duration:13s;
}

.bubbles span:nth-child(6){
    left:82%;
    width:50px;
    height:50px;
    animation-duration:15s;
}

.bubbles span:nth-child(7){
    left:92%;
    animation-duration:11s;
}

.bubbles span:nth-child(8){
    left:50%;
    width:80px;
    height:80px;
    animation-duration:25s;
}

@keyframes floatBubble{
    from{
        transform:translateY(0) rotate(0deg);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    to{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}
.stars{
    position:fixed;
    inset:0;
    background-image:
    radial-gradient(rgba(31, 31, 239, 0.418) 1px, transparent 1px),
    radial-gradient(rgba(57, 43, 252, 0.479) 2px, transparent 2px);

    background-size:80px 80px, 120px 120px;

    animation:twinkle 4s infinite alternate;

    opacity:0.4;
    pointer-events:none;
}

@keyframes twinkle{
    from{
        opacity:0.2;
    }

    to{
        opacity:0.6;
    }
}

        footer{
            margin-top:25px;
            color:#777;
            font-size:14px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🌍 HELLO SRMA 24 KEDIRI IN THE WORLD!</h1>

        <p class="intro">
            Today, I'm so happy because I'm learning web development 🚀
        </p>

        <!-- Ganti dengan nama file foto kamu -->
        <img src="imut2.jpg" alt="Foto Saya">

        <br>

       
        <h2>📅 Planning Today</h2>

        <ol>
            <li>🍽️ Makan</li>
            <li>📚 Belajar</li>
            <li>😴 Tidur</li>
            <li>🚿 Mandi</li>
        </ol> 
        <div class="bubbles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>
<div class="stars"></div>

        <footer>
            Made with ❤️ by SRMA 24 Kediri
        </footer>

    </div>

</body>
</html>
